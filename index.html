<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облік закупівель</title>
    
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://n8n.dmytrotovstytskyi.online https://generativelanguage.googleapis.com;">
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Performance: Optimized font loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
    
    <!-- Performance: External CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Security: Additional security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- PWA: Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Закупівлі">
    <meta name="msapplication-TileColor" content="#4f46e5">
    <meta name="theme-color" content="#4f46e5">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <button class="back-button" id="backButton" style="display: none;">
                <i data-lucide="arrow-left"></i>
            </button>
            <h1 class="header-title" id="headerTitle">Облік закупівель</h1>
            <button class="theme-toggle" id="themeToggle">
                <i data-lucide="moon" class="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <p>Завантаження...</p>
        </div>

        <div class="screen" id="mainScreen" style="display: none;">
            <div class="tab-content" id="purchasesTab">
                <div class="purchases-page">
                    <div class="page-header fade-in">
                        <h2>Оберіть дію</h2>
                        <p>Виберіть тип операції для обліку</p>
                    </div>

                    <div class="categories-grid">
                        <div class="category-row fade-in" style="animation-delay: 100ms;">
                            <button class="category-card start-purchase" onclick="startPurchase()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="category-icon lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/><line x1="12" x2="12" y1="5" y2="12"/><line x1="15" x2="9" y1="8.5" y2="8.5"/></svg>
                                <span class="category-label">Почати закупку</span>
                            </button>
                        </div>
                        <div class="category-row fade-in" style="animation-delay: 200ms;">
                            <button class="category-card glassmorphism unloading" onclick="startUnloading()">
                                <i data-lucide="truck" class="category-icon"></i>
                                <span class="category-label">Розвантаження</span>
                            </button>
                            <button class="category-card glassmorphism delivery" onclick="startDelivery()">
                                <i data-lucide="package" class="category-icon"></i>
                                <span class="category-label">Доставка</span>
                            </button>
                        </div>
                        <div class="end-day-section fade-in" style="animation-delay: 300ms;">
                            <button class="end-day-button" onclick="endWorkDay()">
                                <i data-lucide="sunset"></i>
                                <span>Завершити день</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="historyTab" style="display: none;">
                <div class="cart-page">
                    <div class="page-header">
                        <h2>Історія за сесію</h2>
                        <p id="historySummary">Ще немає записів</p>
                    </div>
                    <div class="cart-items" id="historyItems"></div>
                    <div class="cart-empty" id="historyEmpty">
                        <div class="empty-icon">📖</div>
                        <p>Тут буде історія ваших операцій за сьогодні</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen" id="purchaseFormScreen" style="display: none;">
            <div class="purchase-form-page">
                 <div class="page-header">
                    <h2 id="formTitle">Нова закупівля</h2>
                    <p id="formSubtitle">Вкажіть дані про товар</p>
                </div>
                <div class="form-container glassmorphism">
                    <form class="purchase-form" id="purchaseForm">
                        <div class="form-group">
                            <label for="productName">Назва товару</label>
                            <input type="text" id="productName" list="productSuggestions" placeholder="Наприклад: Помідори червоні" required>
                            <datalist id="productSuggestions"></datalist>
                        </div>
                        <div class="form-group">
                            <label for="quantity">Кількість</label>
                            <input type="number" id="quantity" step="0.1" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label for="unit">Одиниця виміру</label>
                            <select id="unit" required></select>
                        </div>
                        <div class="form-group" id="priceGroup">
                            <label for="pricePerUnit">Ціна за одиницю, ₴</label>
                            <input type="number" id="pricePerUnit" step="0.01" min="0" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="location" id="locationLabel">Локація</label>
                            <select id="location" required></select>
                        </div>
                        <div class="form-group" id="customLocationGroup" style="display: none;">
                            <label for="customLocation">Вкажіть локацію</label>
                            <input type="text" id="customLocation" placeholder="Введіть назву локації" required disabled>
                        </div>
                        <div class="form-group">
                            <label>Фото товару</label>
                            <div class="photo-uploader">
                                <input type="file" id="photoInput" accept="image/*" style="display: none;">
                                <button type="button" class="photo-button" onclick="document.getElementById('photoInput').click()">
                                    <i data-lucide="camera"></i>
                                    <span>Додати фото</span>
                                </button>
                                <div class="photo-preview" id="photoPreview" style="display: none;">
                                    <img id="previewImage" alt="Попередній перегляд">
                                    <button type="button" class="remove-photo" onclick="removePhoto()">
                                        <i data-lucide="x"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="total-display" id="totalGroup">
                            <span id="totalAmount">0.00 ₴</span>
                        </div>
                        <button type="submit" class="save-button" id="saveButton">
                            <i data-lucide="send"></i>
                            <span id="saveButtonText">Відправити в облік</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-navigation" id="bottomNavigation">
        <button class="nav-button active" data-tab="purchases" onclick="switchTab('purchases')">
            <i data-lucide="shopping-cart"></i>
            <span>Закупівлі</span>
        </button>
        <button class="nav-button" data-tab="history" onclick="switchTab('history')">
            <i data-lucide="history"></i>
            <span>Історія</span>
        </button>
    </nav>

    <div class="toast-container" id="toastContainer"></div>
    
    <div class="modal" id="aiSummaryModal" style="display: none;">
        <div class="modal-content glassmorphism">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">✨ AI-звіт дня</h2>
                <button class="back-button" onclick="closeAiSummaryModal()"><i data-lucide="x"></i></button>
            </div>
            <div id="aiSummaryOutput"><div class="spinner"></div><p class="mt-2 text-center">Генерую звіт...</p></div>
            <div class="flex gap-4 mt-4">
                 <button class="save-button" style="background-color: var(--muted); color: var(--foreground);" onclick="closeAiSummaryModal()">Закрити</button>
                 <button class="end-day-button" id="confirmEndDayBtn">Підтвердити та очистити</button>
            </div>
        </div>
    </div>

    <!-- Performance: Load external scripts -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="app.js"></script>
</body>
</html>
